<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexGen Web3 dApp</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        crypto: {
                            superdark: '#0B0B0F',
                            card: '#13131A',
                        }
                    },
                    fontFamily: {
                        sans: ['Space Grotesk', 'sans-serif'],
                        mono: ['Fira Code', 'monospace']
                    },
                    animation: {
                        'blob': 'blob 7s infinite',
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        blob: {
                            '0%': { transform: 'translate(0px, 0px) scale(1)' },
                            '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                            '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                            '100%': { transform: 'translate(0px, 0px) scale(1)' },
                        }
                    }
                }
            }
        }
    </script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">

    <!-- SweetAlert2 (Modales Modernos) -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        .swal2-popup.crypto-swal {
            background: rgba(19, 19, 26, 0.85) !important;
            backdrop-filter: blur(20px) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            border-radius: 24px !important;
            color: #fff !important;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 40px rgba(99, 102, 241, 0.15) !important;
        }

        .swal2-title,
        .swal2-html-container {
            font-family: 'Space Grotesk', sans-serif !important;
            color: #d1d5db !important;
        }

        .swal2-title {
            color: #fff !important;
            font-weight: 700 !important;
        }
    </style>

    <style>
        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: #0B0B0F;
            color: #ffffff;
            overflow-x: hidden;
        }

        .glass-panel {
            background: rgba(19, 19, 26, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .input-glass {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .input-glass:focus {
            border-color: #a855f7;
            outline: none;
            box-shadow: 0 0 0 2px rgba(168, 85, 247, 0.2), inset 0 0 10px rgba(168, 85, 247, 0.1);
        }

        .gradient-text {
            background: linear-gradient(to right, #06b6d4, #6366f1, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 200% auto;
            animation: gradientShift 4s linear infinite;
        }

        @keyframes gradientShift {
            0% {
                background-position: 0% center;
            }

            50% {
                background-position: 100% center;
            }

            100% {
                background-position: 0% center;
            }
        }

        /* Hide arrows from number input */
        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        input[type=number] {
            -moz-appearance: textfield;
            appearance: textfield;
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #0B0B0F;
        }

        ::-webkit-scrollbar-thumb {
            background: #2A2B36;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #3f3f4e;
        }
    </style>
</head>

<body class="min-h-screen relative flex flex-col antialiased selection:bg-purple-500/30 selection:text-white">

    <!-- Glowing Animated Background -->
    <div class="fixed top-0 left-0 w-full h-full overflow-hidden -z-10 pointer-events-none">
        <div
            class="absolute top-[-20%] left-[-10%] w-[50vw] h-[50vw] rounded-full bg-purple-600/15 blur-[120px] mix-blend-screen animate-blob">
        </div>
        <div class="absolute top-[20%] right-[-20%] w-[60vw] h-[60vw] rounded-full bg-cyan-600/10 blur-[120px] mix-blend-screen animate-blob"
            style="animation-delay: 2s;"></div>
        <div class="absolute bottom-[-20%] left-[20%] w-[55vw] h-[55vw] rounded-full bg-indigo-600/15 blur-[120px] mix-blend-screen animate-blob"
            style="animation-delay: 4s;"></div>

        <!-- Tech grid overlay -->
        <div
            class="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNDAiIGhlaWdodD0iNDAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PGNpcmNsZSBjeD0iMiIgY3k9IjIiIHI9IjEiIGZpbGw9InJnYmEoMjU1LDI1NSwyNTUsMC4wNCkiLz48L3N2Zz4=')] [mask-image:linear-gradient(to_bottom,white_20%,transparent_100%)]">
        </div>
    </div>

    <!-- Navigation Header -->
    <nav
        class="w-full relative z-20 px-6 py-5 flex justify-between items-center glass-panel border-b-0 border-white/5 shadow-none rounded-b-3xl">

        <button id="botonBlockchain"
            class="relative group px-6 py-2.5 rounded-xl font-medium text-sm transition-all duration-300 transform hover:-translate-y-0.5 overflow-hidden">
            <div
                class="absolute inset-0 bg-gradient-to-r from-indigo-500/80 to-purple-600/80 rounded-xl opacity-0 group-hover:opacity-100 transition-opacity duration-300">
            </div>
            <div
                class="absolute inset-0 bg-white/5 border border-white/10 rounded-xl group-hover:bg-transparent group-hover:border-transparent transition-colors duration-300">
            </div>
            <span class="relative z-10 flex items-center gap-2 group-hover:text-white text-gray-200">
                <span class="w-2 h-2 rounded-full bg-red-500 animate-pulse group-hover:bg-red-400"></span>
                Conectar Wallet
            </span>
        </button>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow flex items-center justify-center p-6 relative z-10 w-full mt-4 md:mt-0">

        <div class="w-full max-w-[560px] mx-auto opacity-0 animate-[fadeIn_0.8s_ease-out_forwards]">

            <div class="text-center mb-10">
                <div
                    class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full glass-panel border border-purple-500/20 text-purple-300 text-xs font-medium mb-6 animate-[slideDown_0.6s_ease-out]">
                    <span class="w-2 h-2 rounded-full bg-purple-400 animate-pulse"
                        style="box-shadow: 0 0 10px #a855f7;"></span>
                    <span class="tracking-wide">HACKATHON WEB3 EDITION</span>
                </div>
                <h1 class="text-5xl md:text-6xl font-bold mb-4 tracking-tight leading-tight">
                    Funding the <br />
                    <span class="gradient-text drop-shadow-[0_0_15px_rgba(99,102,241,0.3)]">Future of Web3</span>
                </h1>
                <p class="text-gray-400 text-base md:text-lg max-w-sm mx-auto font-light leading-relaxed">
                    A seamless and secure gateway to interact with smart contracts on the blockchain.
                </p>
            </div>

            <!-- Interative Action Card -->
            <div class="glass-panel rounded-3xl p-1.5 relative overflow-hidden group">
                <!-- Inner animated glowing border effect -->
                <div
                    class="absolute inset-[1px] bg-gradient-to-br from-indigo-500/20 via-transparent to-purple-500/20 rounded-[23px] opacity-0 group-hover:opacity-100 transition-opacity duration-700 pointer-events-none">
                </div>

                <div class="bg-[#111116] rounded-[24px] p-6 sm:p-8 relative z-10 border border-white/5 shadow-2xl">

                    <!-- Quick Actions / Balances -->
                    <div class="grid grid-cols-2 gap-4 mb-8">
                        <button id="getBalance"
                            class="flex flex-col items-center justify-center p-5 rounded-2xl bg-gradient-to-b from-white/5 to-white/[0.02] hover:from-indigo-500/10 hover:to-transparent border border-white/5 hover:border-indigo-500/30 transition-all duration-300 group/btn">
                            <div
                                class="p-3 rounded-xl bg-indigo-500/10 text-indigo-400 mb-3 group-hover/btn:scale-110 group-hover/btn:bg-indigo-500/20 group-hover/btn:shadow-[0_0_20px_rgba(99,102,241,0.2)] transition-all">
                                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round">
                                    <path d="M22 12h-4l-3 9L9 3l-3 9H2" />
                                </svg>
                            </div>
                            <span
                                class="text-xs text-gray-400 font-medium tracking-wide uppercase group-hover/btn:text-gray-300 mb-1">Cuenta</span>
                            <span id="balanceCuentaText" class="text-sm font-semibold text-white">Ver Balance</span>
                        </button>

                        <button id="getBalanceContract"
                            class="flex flex-col items-center justify-center p-5 rounded-2xl bg-gradient-to-b from-white/5 to-white/[0.02] hover:from-purple-500/10 hover:to-transparent border border-white/5 hover:border-purple-500/30 transition-all duration-300 group/btn">
                            <div
                                class="p-3 rounded-xl bg-purple-500/10 text-purple-400 mb-3 group-hover/btn:scale-110 group-hover/btn:bg-purple-500/20 group-hover/btn:shadow-[0_0_20px_rgba(168,85,247,0.2)] transition-all">
                                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round">
                                    <rect width="20" height="14" x="2" y="5" rx="2" />
                                    <path d="M2 10h20" />
                                </svg>
                            </div>
                            <span
                                class="text-xs text-gray-400 font-medium tracking-wide uppercase group-hover/btn:text-gray-300 mb-1">Contrato</span>
                            <span id="balanceContratoText" class="text-sm font-semibold text-white">Ver Balance</span>
                        </button>
                    </div>

                    <div class="flex items-center gap-4 mb-8">
                        <div class="h-[1px] flex-1 bg-gradient-to-r from-transparent via-white/10 to-transparent"></div>
                        <span class="text-xs font-mono text-gray-500 tracking-widest uppercase">Transacción</span>
                        <div class="h-[1px] flex-1 bg-gradient-to-r from-transparent via-white/10 to-transparent"></div>
                    </div>

                    <!-- Funding Form Area -->
                    <div class="space-y-6">
                        <div class="relative">
                            <div class="flex justify-between items-center mb-3 px-1">
                                <label for="ethAmount" class="font-medium text-sm text-gray-300">Cantidad a
                                    invertir</label>
                                <div
                                    class="flex items-center gap-1.5 bg-green-500/10 px-2 py-0.5 rounded text-[10px] text-green-400 border border-green-500/20 uppercase tracking-widest font-mono">
                                    <span class="w-1.5 h-1.5 rounded-full bg-green-400"></span>
                                    Red Anvil
                                </div>
                            </div>

                            <div class="relative group">
                                <div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none z-10">
                                    <div
                                        class="w-8 h-8 rounded-full bg-gradient-to-b from-gray-700 to-gray-900 flex items-center justify-center border border-white/20 shadow-inner">
                                        <svg viewBox="0 0 24 24" class="w-4 h-4 text-white" fill="currentColor">
                                            <path
                                                d="M11.944 17.97L4.58 13.62 11.943 24l7.37-10.38-7.372 4.35h.003zM12.056 0L4.69 12.223l7.365 4.354 7.365-4.35L12.056 0z" />
                                        </svg>
                                    </div>
                                </div>

                                <input type="number" id="ethAmount" step="0.001" min="0" placeholder="0.00"
                                    class="input-glass w-full pl-16 pr-20 py-5 rounded-2xl text-2xl font-mono text-white placeholder-gray-600 transition-all duration-300" />

                                <div class="absolute inset-y-0 right-0 flex items-center pr-5 pointer-events-none">
                                    <span class="text-gray-400 font-semibold text-lg">ETH</span>
                                </div>
                            </div>
                        </div>

                        <button id="submitButton" type="button"
                            class="w-full relative group overflow-hidden rounded-2xl p-[1px] shadow-[0_0_30px_rgba(99,102,241,0.15)] hover:shadow-[0_0_40px_rgba(168,85,247,0.3)] transition-all duration-500 transform hover:-translate-y-1">
                            <span
                                class="absolute inset-0 bg-gradient-to-r from-cyan-400 via-indigo-500 to-purple-600 opacity-80 group-hover:opacity-100 transition-opacity duration-300 animate-[gradientShift_4s_linear_infinite] bg-[length:200%_auto]"></span>
                            <div
                                class="relative flex items-center justify-center gap-3 bg-crypto-superdark/90 backdrop-blur-sm group-hover:bg-crypto-superdark/40 transition-colors duration-300 px-6 py-5 rounded-2xl">
                                <span class="font-bold text-lg text-white tracking-wide">Comprar ETH</span>
                                <svg xmlns="http://www.w3.org/2000/svg"
                                    class="w-5 h-5 text-white transform group-hover:translate-x-1.5 transition-transform duration-300"
                                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                    stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M5 12h14" />
                                    <path d="m12 5 7 7-7 7" />
                                </svg>
                            </div>
                        </button>
                    </div>

                    <!-- Secondary Actions (Admin/Info) -->
                    <div class="mt-8 pt-6 border-t border-white/5 flex gap-4">
                        <button id="botonWithdraw" class="flex-1 relative group overflow-hidden rounded-2xl p-[1px] shadow-[0_0_15px_rgba(239,68,68,0.05)] hover:shadow-[0_0_20px_rgba(239,68,68,0.15)] transition-all duration-300 transform hover:-translate-y-1">
                             <span class="absolute inset-0 bg-gradient-to-r from-red-500/50 to-orange-600/50 opacity-0 group-hover:opacity-100 transition-opacity duration-300"></span>
                             <div class="relative flex flex-col items-center justify-center gap-2 bg-[#111116] group-hover:bg-crypto-superdark/60 transition-colors duration-300 px-4 py-4 rounded-2xl border border-red-500/20">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" class="text-red-400 group-hover:scale-110 transition-transform" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>
                                 <span class="font-medium text-xs sm:text-sm text-gray-300 group-hover:text-white">Retirar ETH</span>
                             </div>
                        </button>

                        <button id="botonFunders" class="flex-1 relative group overflow-hidden rounded-2xl p-[1px] shadow-[0_0_15px_rgba(16,185,129,0.05)] hover:shadow-[0_0_20px_rgba(16,185,129,0.15)] transition-all duration-300 transform hover:-translate-y-1">
                             <span class="absolute inset-0 bg-gradient-to-r from-emerald-500/50 to-teal-600/50 opacity-0 group-hover:opacity-100 transition-opacity duration-300"></span>
                             <div class="relative flex flex-col items-center justify-center gap-2 bg-[#111116] group-hover:bg-crypto-superdark/60 transition-colors duration-300 px-4 py-4 rounded-2xl border border-emerald-500/20">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" class="text-emerald-400 group-hover:scale-110 transition-transform" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                                 <span class="font-medium text-xs sm:text-sm text-gray-300 group-hover:text-white">Ver Donantes</span>
                             </div>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Footer Decorative Details -->
            <div class="mt-8 flex flex-col items-center justify-center space-y-2 opacity-60">
                <div class="flex items-center gap-2 text-xs font-mono text-gray-500">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        class="text-green-500">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10" />
                    </svg>
                    Contrato Inteligente Seguro
                </div>
            </div>


        </div>
    </main>

    <style>
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.95);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>

    <!-- App Logic -->
    <script type="module" src="./script.ts"></script>

    <!-- Visual Enhancements Script (no toca la logica web3) -->
    <script>
        // Este script es solo para mejorar el UI de "Conectado"
        // dado que script.js reemplaza el innerText del botón bruscamente.
        document.addEventListener('DOMContentLoaded', () => {
            const btn = document.getElementById('botonBlockchain');

            const observer = new MutationObserver((mutations) => {
                mutations.forEach((mutation) => {
                    const text = btn.innerText || btn.textContent;
                    if (mutation.type === 'characterData' || mutation.type === 'childList') {
                        // Cuando script.js cambie el texto a ¡Conectado!...
                        if (text.includes('Conectado') && !btn.querySelector('.connected-ui')) {
                            btn.innerHTML = `
                                <div class="absolute inset-0 bg-green-500/10 border border-green-500/30 rounded-xl connected-ui shadow-[0_0_15px_rgba(74,222,128,0.2)]"></div>
                                <span class="relative z-10 flex items-center gap-2 text-green-400 font-semibold tracking-wide">
                                    <span class="w-2.5 h-2.5 rounded-full bg-green-400 shadow-[0_0_10px_#4ade80]"></span> 
                                    ¡Conectado!
                                </span>
                            `;
                        }
                    }
                });
            });

            observer.observe(btn, { childList: true, characterData: true, subtree: true });
        });

        // Interceptor Mágico: Transforma logs y alerts de Web3 en Modales modernos sin tocar script.js
        document.addEventListener('DOMContentLoaded', () => {

            // 1. Interceptar Console Log para Balances, Conexiones y hashes de TX
            const originalLog = console.log;
            console.log = function (...args) {
                originalLog.apply(console, args);
                const msg = args.join(' ');

                if (msg.includes('Balance Cuenta:')) {
                    const balance = parseFloat(msg.split(':')[1].trim()).toFixed(4);
                    const el = document.getElementById('balanceCuentaText');
                    if (el) {
                        el.innerHTML = balance + ' <span class="text-[10px] text-indigo-400 font-mono tracking-widest ml-1">ETH</span>';
                        el.classList.add('text-indigo-300');
                    }
                    Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: 'Balance de cuenta actualizado', showConfirmButton: false, timer: 3000, customClass: { popup: 'crypto-swal' } });
                }
                else if (msg.includes('Balance del contrato:')) {
                    const balance = parseFloat(msg.split(':')[1].trim()).toFixed(4);
                    const el = document.getElementById('balanceContratoText');
                    if (el) {
                        el.innerHTML = balance + ' <span class="text-[10px] text-purple-400 font-mono tracking-widest ml-1">ETH</span>';
                        el.classList.add('text-purple-300');
                    }
                    Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: 'Balance del contrato actualizado', showConfirmButton: false, timer: 3000, customClass: { popup: 'crypto-swal' } });
                }
                else if (msg.includes('Transacción enviada. Hash:')) {
                    const hash = msg.split('Hash:')[1].trim();
                    Swal.fire({
                        title: '¡Transacción Enviada!',
                        html: `Tu contribución ha sido procesada de manera segura.<br><div style="background:rgba(0,0,0,0.4); padding:12px; border-radius:12px; margin-top:15px; font-family:monospace; color:#a855f7; word-break:break-all; border:1px solid rgba(255,255,255,0.08); font-size:13px;">${hash}</div>`,
                        icon: 'success',
                        customClass: { popup: 'crypto-swal' },
                        confirmButtonColor: '#6366f1',
                        confirmButtonText: 'Ver en explorador',
                        backdrop: `rgba(0,0,0,0.6)`
                    });
                }
                else if (msg.includes('Cuenta conectada:')) {
                    const account = msg.split(':')[1].trim();
                    const shortAccount = account.slice(0, 6) + '...' + account.slice(-4);
                    Swal.fire({
                        toast: true, position: 'top-end', icon: 'success',
                        title: 'Billetera Conectada',
                        text: shortAccount,
                        showConfirmButton: false, timer: 3500, customClass: { popup: 'crypto-swal' }
                    });
                }
            };

            // 2. Interceptar Alerts nativos y convertirlos a Modales SweetAlert
            const originalAlert = window.alert;
            window.alert = function (msg) {
                if (msg.includes('Revisa MetaMask')) {
                    // Ignoramos la alerta vieja ya que mostramos el modal del hash arriba
                    return;
                } else if (msg.includes('Instala MetaMask')) {
                    Swal.fire({
                        title: 'Extensión Requerida',
                        text: 'Necesitas instalar MetaMask en tu navegador para interactuar con la Web3 de forma segura.',
                        icon: 'warning',
                        customClass: { popup: 'crypto-swal' },
                        confirmButtonColor: '#a855f7',
                        confirmButtonText: 'Entendido'
                    });
                } else if (msg.includes('válida')) {
                    Swal.fire({
                        title: 'Cantidad Inválida',
                        text: 'Por favor, ingresa una cantidad válida de ETH mayor a cero.',
                        icon: 'info',
                        customClass: { popup: 'crypto-swal' },
                        confirmButtonColor: '#6366f1',
                    });
                } else {
                    Swal.fire({
                        text: msg,
                        icon: 'info',
                        customClass: { popup: 'crypto-swal' },
                        confirmButtonColor: '#6366f1',
                    });
                }
            };
        });
    </script>
</body>

</html>
